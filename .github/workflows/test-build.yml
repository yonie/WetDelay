name: Test Build

on:
  push:
    branches:
      - 'feature/**'
      - 'main'
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone VST3 SDK
        run: git clone --recursive https://github.com/steinbergmedia/vst3sdk.git

      - name: Build
        run: ./build.bat

      - name: Validate Windows plugin
        run: |
          echo "Running VST3 validator (47 tests)..."
          WetDelay/build/bin/Release/validator.exe WetDelay/build/VST3/Release/WetDelay.vst3

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone VST3 SDK
        run: git clone --recursive https://github.com/steinbergmedia/vst3sdk.git

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc g++ libstdc++6 libx11-xcb-dev libxcb-util-dev \
            libxcb-cursor-dev libxcb-xkb-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libfontconfig1-dev libcairo2-dev libgtkmm-3.0-dev libsqlite3-dev \
            libxcb-keysyms1-dev

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Validate Linux plugin
        run: |
          echo "Running VST3 validator (47 tests)..."
          WetDelay/build/bin/Release/validator WetDelay/build/VST3/Release/WetDelay.vst3

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone VST3 SDK
        run: git clone --recursive https://github.com/steinbergmedia/vst3sdk.git

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Validate macOS plugin
        run: |
          echo "Running VST3 validator (47 tests)..."
          # macOS builds validator in WetDelay/build/bin/Release/
          if [ -f "WetDelay/build/bin/Release/validator" ]; then
            ./WetDelay/build/bin/Release/validator "WetDelay/build/Release/WetDelay.vst3"
          else
            echo "Validator not found, checking alternative locations..."
            find . -name "validator" -type f 2>/dev/null
            echo "Skipping validation - validator binary not located"
          fi